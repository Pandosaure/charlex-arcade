function handleTS(id,x,y){
  if(phase==='title'){phase='nameEntry';nameEntry.hero={name:'',confirmed:false};nameEntry.master={name:'',confirmed:false};sfx(440,.15,'sine',.08);return}
  if(phase==='nameEntry'){handleNameTouch(x,y);return}
  if(phase==='augmentSelect'){handleAugTouch(x,y);return}
  if(phase==='deckSwap'){handleDeckSwapTouch(x,y);return}
  if(phase==='midGame'){handleMidTouch(x,y);return}
  if(phase==='finalResult'){handleFinalTouch(x,y);return}
  if(phase==='playing'){
    if(y>H-H_UI-20||y>MID){if(!joy.active){joy.active=true;joy.id=id;joy.ox=x;joy.oy=y;joy.dx=0;joy.dy=0;joy.dist=0}}
    else{handleMasterTouch(x,y)}}}
function handleTM(id,x,y){if(phase==='playing'&&joy.active&&joy.id===id){joy.dx=x-joy.ox;joy.dy=y-joy.oy;joy.dist=Math.hypot(joy.dx,joy.dy);if(joy.dist>60){const s=60/joy.dist;joy.dx*=s;joy.dy*=s;joy.dist=60}}}
function handleTE(id){if(joy.active&&joy.id===id){joy.active=false;joy.dx=0;joy.dy=0;joy.dist=0}}

function handleNameTouch(x,y){
  if(y>MID&&!nameEntry.hero.confirmed){const pre=hitPreset(x,y,HERO_PRESETS);if(pre){nameEntry.hero.name=pre;sfx(440,.08,'sine',.05);return}
    const hit=hitKB(x,y);
    if(hit==='OK'&&nameEntry.hero.name.length>=1){nameEntry.hero.confirmed=true;sfx(600,.12,'sine',.08);if(nameEntry.master.confirmed){playerBottom=nameEntry.hero.name;playerTop=nameEntry.master.name;startMatch1()}}
    else if(hit==='DEL'&&nameEntry.hero.name.length>0){nameEntry.hero.name=nameEntry.hero.name.slice(0,-1);sfx(200,.08,'sine',.04)}
    else if(hit&&hit!=='OK'&&hit!=='DEL'&&nameEntry.hero.name.length<10){nameEntry.hero.name+=hit;sfx(440,.06,'sine',.04)}}
  if(y<MID&&!nameEntry.master.confirmed){const mx=W-x,my=H-y;
    const pre=hitPreset(mx,my,MASTER_PRESETS);if(pre){nameEntry.master.name=pre;sfx(440,.08,'sine',.05);return}
    const hit=hitKB(mx,my);
    if(hit==='OK'&&nameEntry.master.name.length>=1){nameEntry.master.confirmed=true;sfx(600,.12,'sine',.08);if(nameEntry.hero.confirmed){playerBottom=nameEntry.hero.name;playerTop=nameEntry.master.name;startMatch1()}}
    else if(hit==='DEL'&&nameEntry.master.name.length>0){nameEntry.master.name=nameEntry.master.name.slice(0,-1);sfx(200,.08,'sine',.04)}
    else if(hit&&hit!=='OK'&&hit!=='DEL'&&nameEntry.master.name.length<10){nameEntry.master.name+=hit;sfx(440,.06,'sine',.04)}}}
function hitKB(x,y){const by=MID+10,kbY0=by+95,rowH=Math.min(34,(H-kbY0-50)/(KB_ROWS.length+1));
  for(let ri=0;ri<KB_ROWS.length;ri++){const row=KB_ROWS[ri],keyW=Math.min(32,(W-20)/row.length-3),tw=row.length*(keyW+3)-3,rx=W/2-tw/2,ry=kbY0+ri*(rowH+3);
    for(let ki=0;ki<row.length;ki++){const kx=rx+ki*(keyW+3);if(x>=kx&&x<=kx+keyW&&y>=ry&&y<=ry+rowH)return row[ki]}}
  const botY=kbY0+KB_ROWS.length*(rowH+3),delW=56,okW=66,gap=6,spW=W-delW-okW-40-gap*2;
  if(x>=10&&x<=10+delW&&y>=botY&&y<=botY+rowH)return'DEL';
  if(x>=10+delW+gap&&x<=10+delW+gap+spW&&y>=botY&&y<=botY+rowH)return' ';
  if(x>=W-okW-10&&x<=W-10&&y>=botY&&y<=botY+rowH)return'OK';return null}
function hitPreset(x,y,presets){const by=MID+10,preH=28,preGap=6,preY=by+58;ctx.font='bold 12px sans-serif';
  const preW=presets.map(n=>ctx.measureText(n).width+20),totalPreW=preW.reduce((a,b)=>a+b,0)+preGap*(presets.length-1);
  let px=W/2-totalPreW/2;for(let i=0;i<presets.length;i++){if(x>=px&&x<=px+preW[i]&&y>=preY&&y<=preY+preH)return presets[i];px+=preW[i]+preGap}return null}

// AUGMENT TOUCH + DECK SWAP
function handleAugTouch(x,y){
  const cw=Math.min(120,W*.3),ch=140,gap=10;
  if(y>MID&&!augSel.heroPicked){const total=augSel.heroChoices.length*(cw+gap)-gap,sx=W/2-total/2,by=MID+50;
    for(let i=0;i<augSel.heroChoices.length;i++){if(x>=sx+i*(cw+gap)&&x<=sx+i*(cw+gap)+cw&&y>=by&&y<=by+ch){
      const a=augSel.heroChoices[i];a.apply(hero);hero.augs.push(a.id);augSel.heroPicked=true;augSel.heroChoice=a;
      sfx(600,.2,'sine',.08);checkBothPicked();return}}}
  if(y<MID&&!augSel.masterPicked){const mx=W-x,my=H-y;
    const total=augSel.masterChoices.length*(cw+gap)-gap,sx=W/2-total/2,by=MID+50;
    for(let i=0;i<augSel.masterChoices.length;i++){if(mx>=sx+i*(cw+gap)&&mx<=sx+i*(cw+gap)+cw&&my>=by&&my<=by+ch){
      const a=augSel.masterChoices[i];
      if(a.isMonster){// Monster unlock
        const emptySlot=master.deck.indexOf(null);
        if(emptySlot>=0){master.deck[emptySlot]=a.monKey;augSel.masterPicked=true;augSel.masterChoice=a;
          master.augs.push(a.id);sfx(600,.2,'sine',.08);checkBothPicked()}
        else{augSel.swapPending=a;phase='deckSwap';sfx(300,.15,'sine',.06)}}
      else{a.apply(mBuf);master.augs.push(a.id);augSel.masterPicked=true;augSel.masterChoice=a;
        sfx(600,.2,'sine',.08);checkBothPicked()}
      return}}}}

function handleDeckSwapTouch(x,y){
  // Master side (top half, inverted)
  const mx=W-x,my=H-y;
  const sw=60,sh=60,sgap=10,total=4*(sw+sgap)-sgap,sx=W/2-total/2,sy=MID+40;
  for(let i=0;i<4;i++){const bx=sx+i*(sw+sgap);
    if(mx>=bx&&mx<=bx+sw&&my>=sy&&my<=sy+sh&&master.deck[i]!==null){
      // Remove augments for old monster
      const oldKey=master.deck[i];
      master.augs=master.augs.filter(aid=>{const aug=MASTER_AUGS.find(a=>a.id===aid);return!aug||aug.monReq!==oldKey});
      master.deck[i]=augSel.swapPending.monKey;
      master.augs.push(augSel.swapPending.id);
      augSel.masterPicked=true;augSel.masterChoice=augSel.swapPending;augSel.swapPending=null;
      phase='augmentSelect';sfx(600,.2,'sine',.08);checkBothPicked();return}}}

function checkBothPicked(){if(augSel.heroPicked&&augSel.masterPicked){
  setTimeout(()=>{phase='playing';sharedXP=0;sharedXPNext=Math.floor(sharedXPNext*1.3)},600)}}
function handleMidTouch(x,y){if(x>=W/2-120&&x<=W/2+120&&y>=MID+80&&y<=MID+130){startMatch2();sfx(440,.2,'sine',.08)}}
function handleFinalTouch(x,y){if(x>=W/2-100&&x<=W/2+100&&y>=MID+100&&y<=MID+150){phase='title';gameTime=0;swapped=false;matchGame=0;sfx(440,.15,'sine',.08)}}

// MASTER TOUCH
function handleMasterTouch(x,y){
  if(!roundActive)return;const cfg=getRoundCfg(round);
  if(y<M_UI){const mx=W-x,my=M_UI-y;
    for(let i=0;i<master.spells.length;i++){const sp=master.spells[i],bx=8+i*54,by=4,bsz=46;
      if(mx>=bx&&mx<=bx+bsz&&my>=by&&my<=by+bsz){
        if(sp.cdT<=0&&master.mana>=sp.cost){master.spellMode=master.spellMode===i?-1:i;master.selectedCard=-1;sfx(300,.1,'sine',.05)}return}}
    if(master.bossActive){const aw=50,ah=52,agap=5,ax0=W-aw-10-(bossAbils.length-1)*(aw+agap);
      for(let i=0;i<bossAbils.length;i++){const ab=bossAbils[i],abx=ax0+i*(aw+agap),aby=2;
        if(mx>=abx&&mx<=abx+aw&&my>=aby&&my<=aby+ah){if(ab.charges>0&&ab.cdT<=0){useBossAbility(i);sfx(180,.2,'sawtooth',.08)}return}}
    }else{const bbSz=48,bbX=W-bbSz-8,bbY=4;
      if(mx>=bbX&&mx<=bbX+bbSz&&my>=bbY&&my<=bbY+bbSz&&master.bossReady&&!master.bossActive){summonBoss();sfx(120,.5,'sawtooth',.1);return}
      if(!master.canSpawn)return;
      const cards=cfg.available,cw=48,ch=50,cgap=4,cx0=W-bbSz-16-cards.length*(cw+cgap);
      for(let i=0;i<cards.length;i++){const bx=cx0+i*(cw+cgap),by=2;
        if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+ch){const mc=Math.max(1,MONS[cards[i]].cost-mBuf.costReduc);
          if(master.mana>=mc){master.selectedCard=master.selectedCard===i?-1:i;master.spellMode=-1;master.selectPulse=20;sfx(350,.08,'sine',.05)}return}}}
    return}
  if(y>=M_UI&&y<=MID+30){
    if(master.spellMode>=0){castSpell(master.spellMode,x,y);master.spellMode=-1;return}
    if(!master.bossActive&&master.canSpawn&&master.selectedCard>=0){const mk=cfg.available[master.selectedCard],md=MONS[mk];
      const mc=Math.max(1,md.cost-mBuf.costReduc);
      if(mk&&master.mana>=mc){doSpawn(mk,x,y);master.mana-=mc;master.spawnFlash=15;sfx(200,.15,'triangle',.06)}return}
    if(!master.bossActive)addF(x,y-10,'👆 Sélectionne!','#f88',11)}}

function doSpawn(key,x,y){
  if(key==='rat'&&mBuf.ratSwarm>0){const n=1+mBuf.ratSwarm*2;for(let i=0;i<n;i++){
    const ox=x+(Math.random()-.5)*50,oy=y+(Math.random()-.5)*40;spawnMon(key,ox,oy,.6)}}
  else spawnMon(key,x,y,1)}
function spawnMon(key,x,y,hpScale=1){
  const d=MONS[key],cfg=getRoundCfg(round);
  let hp=Math.floor(d.hp*cfg.hpMult*hpScale),dmg=d.dmg,spd=d.spd;
  let dodge=d.fly?.25:0,ranged=d.ranged||false,range=d.range||30;
  if(key==='skeleton'){hp=Math.floor(hp*(1+mBuf.skelArmor));if(mBuf.skelArcher){ranged=true;range=120;dmg=Math.floor(dmg*.8)}}
  if(key==='bat')dodge+=mBuf.batDodge;
  const cy=Math.max(AY+20,Math.min(AY+AH*.65,y)),cx=Math.max(AX+d.r+5,Math.min(AX+AW-d.r-5,x));
  const m={key,x:cx,y:cy,hp,maxHp:hp,dmg,spd,r:d.r,xp:d.xp,col:d.col,atkRate:d.atkRate,atkCd:0,
    ranged,range,aoe:d.aoe||false,fly:d.fly||false,isBoss:false,
    anim:Math.random()*TAU,slT:0,burnT:0,burnDmg:0,poisonT:0,poisonDmg:0,dodgePct:dodge,dir:0,hitFlash:0,spawnAnim:20,spawnAge:0,
    revivable:(key==='skeleton'&&mBuf.skelRevive)||mBuf.immortalArmy,vampiric:key==='bat'&&mBuf.batDrain,
    canTeleport:key==='mage'&&mBuf.mageTeleport,slamCd:0,
    regenRate:key==='ogre'&&mBuf.ogreRegen?4:0,
    invisible:false,invisTimer:0,necroTimer:0,shielded:mBuf.spawnBlind&&Math.random()<.3,
    dmgReduc:key==='ogre'&&mBuf.ogreRegen?.4:key==='dragon'&&mBuf.dragonArmor?.6:0};
  monsters.push(m);addP(cx,cy,'#a0f',8,2.5,20)}

function summonBoss(){
  master.bossActive=true;master.canSpawn=false;master.selectedCard=-1;master.spellMode=-1;
  if(mBuf.manaSurge)master.mana=master.maxMana;
  const bd=getBoss(round),cfg=getRoundCfg(round);
  const hp=Math.floor((bd.baseHp+round*25)*cfg.hpMult*(1-mBuf.bossArmor*.25));
  const bSpd=bd.spd*(mBuf.bossSpeed?1.4:1);
  boss={key:'boss',type:bd.type,name:bd.name,icon:bd.icon,
    x:W/2,y:AY+60,hp,maxHp:hp,dmg:bd.dmg,spd:bSpd,r:bd.r,col:bd.col,
    atkRate:bd.atkRate,atkCd:0,ranged:false,range:120,aoe:false,fly:false,isBoss:true,
    anim:0,slT:mBuf.bossImmune?-999:0,burnT:0,burnDmg:0,poisonT:0,poisonDmg:0,dodgePct:0,dir:0,hitFlash:0,spawnAnim:40,spawnAge:999,
    specialCd:0,enraged:false,regenRate:mBuf.bossRegen,canEnrage:mBuf.bossEnrage,
    revivable:mBuf.bossEternal,vampiric:false,canTeleport:false,slamCd:0,phase:0,
    invisible:false,invisTimer:0,necroTimer:0,shielded:false,dmgReduc:0,bossImmune:mBuf.bossImmune};
  monsters.push(boss);
  bossAbils=(BOSS_ABILS[bd.type]||[]).map(a=>({...a,charges:a.maxCh,cdT:0}));
  shakeT=20;shakeAmt=8;addF(W/2,MID,'👑 '+bd.name+'!','#f44',24);

function castSpell(idx,tx,ty){const sp=master.spells[idx];if(master.mana<sp.cost||sp.cdT>0)return;
  master.mana-=sp.cost;sp.cdT=sp.cd;sfx(180,.3,'sawtooth',.07);
  if(sp.name==='Météore'){const spDmg=sp.dmg;effects.push({type:'meteor',x:tx,y:ty,life:90,maxLife:90,r:sp.r,dmg:spDmg,hit:false})}
  else if(sp.name==='Mur'){const ww=AW*.6;effects.push({type:'wall',x:Math.max(AX,tx-ww/2),y:ty,w:ww,h:10,life:300,maxLife:300})}
  else if(sp.name==='Feu'){effects.push({type:'firewall',x:AX,y:ty,w:AW,life:150,maxLife:150,dmg:sp.dmg})}
  else if(sp.name==='Piège'){effects.push({type:'trap',x:tx,y:ty,r:25,life:9999,triggered:false})}
  else if(sp.name==='Marée'){effects.push({type:'maree',life:360,maxLife:360})}
  addF(tx,ty-20,sp.icon+' '+sp.name,'#f84',14)}

function useBossAbility(idx){
  const ab=bossAbils[idx];if(!ab||ab.charges<=0||ab.cdT>0)return;
  ab.charges--;ab.cdT=ab.cd;const hx=hero.x,hy=hero.y;
  switch(ab.type){
    case 'rock':monProj.push({x:boss.x,y:boss.y,vx:(hx-boss.x)/30,vy:(hy-boss.y)/30,dmg:boss.dmg,life:60,aoe:true,r:12,col:'#8B7355',trail:[]});shakeT=5;shakeAmt=3;break;
    case 'vines':hero.slowT=240;hero.rootT=60;addP(hx,hy,'#4a2',10,2,20);addF(hx,hy-20,'🌿 Lianes!','#4a2',14);break;

function rollAugs(pool,n,r){
  if(pool.length<=n)return[...pool].sort(()=>Math.random()-.5);
  const tier=Math.min(Math.floor((r-1)/2),4),probs=RAR_PROB[tier];
  const rarIdx={commun:0,uncommun:1,rare:2,epic:3,legendaire:4,mythique:5};
  const weights=pool.map(a=>Math.max(1,probs[rarIdx[a.rarity]||0]));
  const res=[];const used=new Set();
  for(let i=0;i<n&&used.size<pool.length;i++){let totalW=0;for(let j=0;j<pool.length;j++)if(!used.has(j))totalW+=weights[j];
    let roll=Math.random()*totalW,acc=0;
    for(let j=0;j<pool.length;j++){if(used.has(j))continue;acc+=weights[j];if(roll<acc){res.push(pool[j]);used.add(j);break}}}
  return res}

function fireArrow(t){const ang=Math.atan2(t.y-hero.y,t.x-hero.x),spd=5.5,b=hero.dmg;shoot(ang,spd,b);
  for(let i=1;i<=hero.multishot;i++){shoot(ang-i*.22,spd,b);shoot(ang+i*.22,spd,b)}
  if(hero.backshot)shoot(ang+PI,spd,Math.floor(b*.6));
  if(hero.sideshot){shoot(ang+PI/2,spd,Math.floor(b*.5));shoot(ang-PI/2,spd,Math.floor(b*.5))}
  sfx(800,.08,'sine',.04)}
function shoot(a,s,d){hero.arrows.push({x:hero.x,y:hero.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,dmg:d,life:80,bounces:hero.bounce,pierce:hero.pierce,trail:[],hl:null})}
function dmgMon(m,d,cr){m.hp-=d;m.hitFlash=6;addF(m.x,m.y-m.r-5,cr?'💥'+d:''+d,cr?'#f44':'#fff',cr?14:11);addP(m.x,m.y,'#fff',3,2,12)}
function hitHero(d){if(hero.invT>0||hero.dashT>0)return;if(hero.angelT>0)return;
  if(hero.shield>0){hero.shield--;hero.invT=20;hero.shieldRegenCd=300;addF(hero.x,hero.y-20,'🛡️','#4af',12);sfx(500,.1,'sine',.05);shakeT=5;shakeAmt=3;return}
  hero.hp--;hero.invT=45;addF(hero.x,hero.y-25,'-1 ❤️','#f44',14);addP(hero.x,hero.y,'#f44',8,3,20);shakeT=8;shakeAmt=5;sfx(150,.2,'sawtooth',.08);
  // Slow time on hit
  if(hero.augs.includes('slowTime')&&hero.slowTimeCd<=0){hero.slowTimeT=180;hero.slowTimeCd=720;addF(hero.x,hero.y-40,'⏱️','#4af',16)}

  if(hero.hasAngel&&hero.angelCd<=0){hero.angelT=180;hero.angelCd=900;addF(hero.x,hero.y-50,'👼','#fd0',18)}}

function draw(){ctx.save();
  if(swapped&&(phase==='playing'||phase==='augmentSelect'||phase==='deckSwap')){ctx.translate(W/2,H/2);ctx.rotate(PI);ctx.translate(-W/2,-H/2)}
  if(shakeT>0){const s=shakeAmt*(shakeT/12);ctx.translate(Math.random()*s-s/2,Math.random()*s-s/2)}
  if(phase==='title')drawTitle();
  else if(phase==='nameEntry')drawNameEntry();
  else if(phase==='augmentSelect')drawAugSelect();
  else if(phase==='deckSwap')drawDeckSwap();
  else if(phase==='playing')drawGame();
  else if(phase==='midGame')drawMidGame();
  else if(phase==='finalResult')drawFinalResult();
  ctx.restore()}

function drawKBHalf(entry,title,col,presets){
  const by=MID+10;ctx.textAlign='center';ctx.fillStyle=col;ctx.font='bold 16px sans-serif';ctx.fillText(title,W/2,by+15);
  ctx.fillStyle=entry.confirmed?'#4f4':'#fff';ctx.font='bold 24px sans-serif';ctx.fillText(entry.confirmed?entry.name+' ✅':(entry.name||'...'),W/2,by+48);
  if(!entry.confirmed&&gameTime%60<30){const tw=ctx.measureText(entry.name||'...').width;ctx.fillStyle=col;ctx.fillRect(W/2+tw/2+3,by+36,2,20)}
  if(entry.confirmed)return;
  const preH=28,preGap=6,preY=by+58;ctx.font='bold 12px sans-serif';
  const preW=presets.map(n=>ctx.measureText(n).width+20),totalPreW=preW.reduce((a,b)=>a+b,0)+preGap*(presets.length-1);
  let px=W/2-totalPreW/2;
  for(let i=0;i<presets.length;i++){ctx.fillStyle='rgba(255,255,255,.06)';rr(ctx,px,preY,preW[i],preH,12);ctx.fill();
    ctx.strokeStyle=col+'66';ctx.lineWidth=1;rr(ctx,px,preY,preW[i],preH,12);ctx.stroke();
    ctx.fillStyle='#ccc';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(presets[i],px+preW[i]/2,preY+preH/2);px+=preW[i]+preGap}
  const kbY0=by+95,rowH=Math.min(34,(H-kbY0-50)/(KB_ROWS.length+1));
  for(let ri=0;ri<KB_ROWS.length;ri++){const row=KB_ROWS[ri],keyW=Math.min(32,(W-20)/row.length-3),tw=row.length*(keyW+3)-3,rx=W/2-tw/2,ry=kbY0+ri*(rowH+3);
    for(let ki=0;ki<row.length;ki++){const kx=rx+ki*(keyW+3);ctx.fillStyle='rgba(255,255,255,.08)';rr(ctx,kx,ry,keyW,rowH,5);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;rr(ctx,kx,ry,keyW,rowH,5);ctx.stroke();
      ctx.fillStyle='#ccc';ctx.font='bold '+Math.min(14,keyW*.5)+'px sans-serif';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(row[ki],kx+keyW/2,ry+rowH/2)}}
  const botY=kbY0+KB_ROWS.length*(rowH+3),delW=56,okW=66,gap=6,spW=W-delW-okW-40-gap*2;
  ctx.fillStyle='rgba(255,60,60,.15)';rr(ctx,10,botY,delW,rowH,5);ctx.fill();ctx.strokeStyle='rgba(255,60,60,.4)';ctx.lineWidth=1;rr(ctx,10,botY,delW,rowH,5);ctx.stroke();
  ctx.fillStyle='#f88';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('⌫',10+delW/2,botY+rowH/2);
  const spX=10+delW+gap;ctx.fillStyle='rgba(255,255,255,.06)';rr(ctx,spX,botY,spW,rowH,5);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;rr(ctx,spX,botY,spW,rowH,5);ctx.stroke();
  ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.fillText('ESPACE',spX+spW/2,botY+rowH/2);
  const okX=W-okW-10,canOk=entry.name.length>=1;
  ctx.fillStyle=canOk?'rgba(60,200,60,.2)':'rgba(60,60,60,.1)';rr(ctx,okX,botY,okW,rowH,5);ctx.fill();
  ctx.strokeStyle=canOk?'rgba(60,200,60,.5)':'rgba(100,100,100,.2)';ctx.lineWidth=1.5;rr(ctx,okX,botY,okW,rowH,5);ctx.stroke();
  ctx.fillStyle=canOk?'#4f4':'#555';ctx.font='bold 13px sans-serif';ctx.fillText('OK ✓',okX+okW/2,botY+rowH/2)}

function drawAugCards(choices,picked,choice,title,col,startY){
  ctx.textAlign='center';ctx.fillStyle=col;ctx.font='bold 15px sans-serif';ctx.fillText(title,W/2,startY+12);
  if(picked&&choice){ctx.fillStyle='#4f4';ctx.font='bold 14px sans-serif';ctx.fillText('✅ '+choice.icon+' '+choice.name,W/2,startY+35);return}
  const cw=Math.min(120,W*.3),ch=140,gap=10,total=choices.length*(cw+gap)-gap,sx=W/2-total/2,by=startY+30;
  for(let i=0;i<choices.length;i++){const a=choices[i],bx=sx+i*(cw+gap),rc=RAR_COL[a.rarity],rbg=RAR_BG[a.rarity];
    ctx.fillStyle=rbg;rr(ctx,bx,by,cw,ch,10);ctx.fill();
    const ri=RAR.indexOf(a.rarity);if(ri>=2){ctx.shadowColor=rc;ctx.shadowBlur=8+Math.sin(gameTime*.08)*4}
    ctx.strokeStyle=rc;ctx.lineWidth=ri>=4?3:2;rr(ctx,bx,by,cw,ch,10);ctx.stroke();ctx.shadowBlur=0;
    // Monster unlock card has special border
    if(a.isMonster){ctx.strokeStyle='#fd0';ctx.lineWidth=1;ctx.setLineDash([4,4]);rr(ctx,bx+3,by+3,cw-6,ch-6,8);ctx.stroke();ctx.setLineDash([])}
    ctx.font='28px sans-serif';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(a.icon,bx+cw/2,by+28);
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.fillText(a.name,bx+cw/2,by+55);
    ctx.fillStyle=rc;ctx.font='bold 9px sans-serif';
    ctx.fillText({commun:'COMMUN',uncommun:'UNCOMMUN',rare:'RARE',epic:'ÉPIQUE',legendaire:'LÉGENDAIRE',mythique:'MYTHIQUE'}[a.rarity],bx+cw/2,by+72);
    ctx.fillStyle='#aaa';ctx.font='10px sans-serif';wt(ctx,a.desc,bx+cw/2,by+90,cw-12,13)}}

function drawGame(){
  // Arena bg
  let shrinkX=0,shrinkY=0;
  effects.forEach(e=>{if(e.type==='maree'){const prog=1-e.life/e.maxLife;shrinkX=AW*.15*prog;shrinkY=AH*.1*prog}});
  ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#12121f';ctx.fillRect(AX+shrinkX,AY+shrinkY,AW-shrinkX*2,AH-shrinkY*2);
  if(shrinkX>0){ctx.fillStyle='rgba(100,0,0,.3)';
    ctx.fillRect(AX,AY,shrinkX,AH);ctx.fillRect(AX+AW-shrinkX,AY,shrinkX,AH);
    ctx.fillRect(AX,AY,AW,shrinkY);ctx.fillRect(AX,AY+AH-shrinkY,AW,shrinkY)}
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.strokeRect(AX+shrinkX,AY+shrinkY,AW-shrinkX*2,AH-shrinkY*2);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,.02)';for(let gx=AX+40;gx<AX+AW;gx+=40){ctx.beginPath();ctx.moveTo(gx,AY);ctx.lineTo(gx,AY+AH);ctx.stroke()}
  for(let gy=AY+40;gy<AY+AH;gy+=40){ctx.beginPath();ctx.moveTo(AX,gy);ctx.lineTo(AX+AW,gy);ctx.stroke()}
  // Timer bar
  if(!master.bossActive){const tp=Math.min(1,roundTimer/roundMaxTime);
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(AX,AY,AW,3);
    ctx.fillStyle=tp>.8?'#f44':'#4af';ctx.fillRect(AX,AY,AW*tp,3);
    ctx.fillStyle='#888';ctx.font='bold 9px sans-serif';ctx.textAlign='right';ctx.fillText(Math.max(0,Math.ceil((roundMaxTime-roundTimer)/60))+'s',AX+AW-4,AY+14)}
  else{ctx.fillStyle='#f44';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('👑 BOSS FIGHT — PAS DE TIMER',W/2,AY+12)}
  // Combo
  if(comboCount>=3){ctx.fillStyle='#f84';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.fillText('🔥 COMBO ×'+comboCount,AX+6,AY+AH-8)}
  // Global slow indicator
  if(hero.slowTimeT>0){ctx.fillStyle='rgba(60,120,255,.08)';ctx.fillRect(AX,AY,AW,AH);ctx.fillStyle='#4af';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('⏱️ TEMPS RALENTI',W/2,AY+28)}
  // Effects (back layer)
  effects.forEach(e=>{
    if(e.type==='wall'){const al=Math.min(1,e.life/30);ctx.fillStyle='rgba(200,190,160,'+(.7*al).toFixed(2)+')';ctx.fillRect(e.x,e.y,e.w,e.h);
      ctx.strokeStyle='rgba(255,255,200,'+(.5*al).toFixed(2)+')';ctx.lineWidth=2;ctx.strokeRect(e.x,e.y,e.w,e.h);
      // Bone pattern
      for(let bx=e.x+10;bx<e.x+e.w;bx+=20){ctx.fillStyle='rgba(255,255,200,'+(.3*al).toFixed(2)+')';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText('🦴',bx,e.y+e.h/2+3)}}
    if(e.type==='firewall'){const al=e.life/e.maxLife;ctx.fillStyle='rgba(255,80,0,'+(.3*al).toFixed(2)+')';ctx.fillRect(e.x,e.y-8,e.w,16);
      for(let fx=e.x;fx<e.x+e.w;fx+=12){const fh=6+Math.sin(gameTime*.15+fx*.1)*4;ctx.fillStyle='rgba(255,'+Math.floor(100+Math.random()*100)+',0,'+(.5*al).toFixed(2)+')';ctx.fillRect(fx,e.y-fh,8,fh*2)}}
    if(e.type==='poison_pool'){const al=e.life/e.maxLife;ctx.fillStyle='rgba(60,200,60,'+(.25*al).toFixed(2)+')';ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,TAU);ctx.fill()}
    if(e.type==='meteor'&&e.life>30){const prog=1-(e.life-30)/60;ctx.fillStyle='rgba(255,100,0,'+(.15+prog*.2).toFixed(2)+')';ctx.beginPath();ctx.arc(e.x,e.y,e.r*prog,0,TAU);ctx.fill();
      ctx.strokeStyle='rgba(255,60,0,.4)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,TAU);ctx.stroke();ctx.setLineDash([])}
    if(e.type==='meteor'&&e.life<=30){const ex=1-e.life/30;ctx.fillStyle='rgba(255,120,40,'+(.6*(1-ex)).toFixed(2)+')';ctx.beginPath();ctx.arc(e.x,e.y,e.r*(1+ex*.5),0,TAU);ctx.fill()}
    if(e.type==='explosion'){const ex=1-e.life/e.maxLife;ctx.fillStyle='rgba(255,80,40,'+(.5*(1-ex)).toFixed(2)+')';ctx.beginPath();ctx.arc(e.x,e.y,e.r*(1+ex),0,TAU);ctx.fill()}
    if(e.type==='trap'&&!e.triggered){ctx.fillStyle='rgba(200,100,0,.4)';ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,TAU);ctx.fill();ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('🕳️',e.x,e.y+5)}
    if(e.type==='maree'){/* already drawn via shrink */}});
  // Monsters
  monsters.forEach(m=>{if(m.spawnAnim>0){const p=m.spawnAnim/20;ctx.globalAlpha=1-p;ctx.fillStyle=m.col;ctx.beginPath();ctx.arc(m.x,m.y,m.r*(2-p),0,TAU);ctx.fill();ctx.globalAlpha=1;return}
    if(m.invisible){ctx.globalAlpha=.15}
    const flash=m.hitFlash>0;ctx.fillStyle=flash?'#fff':m.col;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,TAU);ctx.fill();
    if(m.isBoss){ctx.strokeStyle='#fd0';ctx.lineWidth=3;ctx.beginPath();ctx.arc(m.x,m.y,m.r+3,0,TAU);ctx.stroke();
      ctx.fillStyle='#f44';ctx.fillRect(m.x-m.r,m.y-m.r-8,m.r*2,4);ctx.fillStyle='#4f4';ctx.fillRect(m.x-m.r,m.y-m.r-8,m.r*2*(m.hp/m.maxHp),4)}
    else{ctx.fillStyle='rgba(255,0,0,.7)';ctx.fillRect(m.x-m.r,m.y-m.r-5,m.r*2,3);ctx.fillStyle='rgba(0,255,0,.7)';ctx.fillRect(m.x-m.r,m.y-m.r-5,m.r*2*(m.hp/m.maxHp),3)}
    if(m.shielded){ctx.strokeStyle='rgba(80,160,255,.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(m.x,m.y,m.r+5,0,TAU);ctx.stroke()}
    // Draw emoji
    ctx.font=(m.isBoss?Math.floor(m.r*1.2):Math.floor(m.r*1.1))+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const icon=m.isBoss?(m.icon||'👑'):(MONS[m.key]?MONS[m.key].icon:'?');ctx.fillText(icon,m.x,m.y+2);
    ctx.globalAlpha=1});
  // Monster projectiles
  monProj.forEach(p=>{if(p.trail.length>1){ctx.strokeStyle=p.col+'60';ctx.lineWidth=p.r*.6;ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);p.trail.forEach(t=>ctx.lineTo(t.x,t.y));ctx.stroke()}
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill()});
  // Hero
  if(hero.invT>0&&hero.invT%6<3){}else{
    ctx.fillStyle=hero.angelT>0?'#fd0':'#4488ff';ctx.beginPath();ctx.arc(hero.x,hero.y,hero.r,0,TAU);ctx.fill();
    ctx.strokeStyle=hero.angelT>0?'rgba(255,215,0,.6)':'rgba(100,180,255,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(hero.x,hero.y,hero.r+3,0,TAU);ctx.stroke();
    ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🏹',hero.x,hero.y+1);
    if(hero.concReady){ctx.strokeStyle='rgba(255,215,0,.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(hero.x,hero.y,hero.r+8,0,TAU);ctx.stroke();ctx.setLineDash([])}}
  // Orbs
  if(hero.orbCount>0){const orbR=8*(1+hero.orbSize);
    for(let i=0;i<hero.orbCount;i++){const a=hero.anim*hero.orbSpd*60+i*(TAU/hero.orbCount),ox=hero.x+Math.cos(a)*hero.orbR,oy=hero.y+Math.sin(a)*hero.orbR;
      let oc=hero.orbFire?'#f80':hero.orbIce?'#4af':hero.orbLightning?'#ff4':'#a4f';
      ctx.fillStyle=oc;ctx.globalAlpha=.7;ctx.beginPath();ctx.arc(ox,oy,orbR,0,TAU);ctx.fill();
      ctx.globalAlpha=.3;ctx.beginPath();ctx.arc(ox,oy,orbR+4,0,TAU);ctx.fill();ctx.globalAlpha=1;
      if(hero.orbVortex){ctx.strokeStyle='rgba(160,80,255,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ox,oy,40+Math.sin(gameTime*.1)*10,0,TAU);ctx.stroke()}}}
  // Hero arrows
  hero.arrows.forEach(a=>{if(a.trail.length>1){ctx.strokeStyle='rgba(100,180,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(a.trail[0].x,a.trail[0].y);a.trail.forEach(t=>ctx.lineTo(t.x,t.y));ctx.stroke()}
    const ang=Math.atan2(a.vy,a.vx);ctx.save();ctx.translate(a.x,a.y);ctx.rotate(ang);
    ctx.fillStyle=hero.fireArrow?'#f80':hero.iceArrow?'#4af':hero.poisonArrow?'#4f4':'#fff';
    ctx.fillRect(-8,-1.5,16,3);ctx.fillStyle='#fd0';ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(4,-3);ctx.lineTo(4,3);ctx.closePath();ctx.fill();ctx.restore()});
  // Particles
  particles.forEach(p=>{const al=p.life/p.maxLife;ctx.fillStyle=p.col;ctx.globalAlpha=al;ctx.beginPath();ctx.arc(p.x,p.y,p.r*al,0,TAU);ctx.fill()});ctx.globalAlpha=1;
  // Floats
  floats.forEach(f=>{ctx.globalAlpha=Math.min(1,f.life/20);ctx.fillStyle=f.col;ctx.font='bold '+f.size+'px sans-serif';ctx.textAlign='center';ctx.fillText(f.text,f.x,f.y)});ctx.globalAlpha=1;
  // Joystick
  if(joy.active){ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(joy.ox,joy.oy,45,0,TAU);ctx.stroke();
    ctx.fillStyle='rgba(100,180,255,.4)';ctx.beginPath();ctx.arc(joy.ox+joy.dx,joy.oy+joy.dy,18,0,TAU);ctx.fill()}
  drawHUI();drawMUI()}

function drawHUI(){ctx.fillStyle='rgba(8,8,20,.92)';ctx.fillRect(0,H-H_UI,W,H_UI);
  ctx.strokeStyle='rgba(80,140,255,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-H_UI);ctx.lineTo(W,H-H_UI);ctx.stroke();
  const by=H-H_UI+4;ctx.fillStyle='#4af';ctx.font='bold 13px sans-serif';ctx.textAlign='left';ctx.fillText('🏹 '+nameEntry.hero.name+' Nv.'+sharedLvl,10,by+12);
  const xpW=W*.45,xpH=8;ctx.fillStyle='rgba(255,255,255,.1)';rr(ctx,10,by+20,xpW,xpH,4);ctx.fill();
  const xg=ctx.createLinearGradient(10,0,10+xpW,0);xg.addColorStop(0,'#4af');xg.addColorStop(1,'#f4a');ctx.fillStyle=xg;
  rr(ctx,10,by+20,xpW*Math.min(1,sharedXP/sharedXPNext),xpH,4);ctx.fill();
  ctx.fillStyle='#89c';ctx.font='9px sans-serif';ctx.fillText('XP '+sharedXP+'/'+sharedXPNext,10+xpW+6,by+28);
  ctx.textAlign='right';ctx.font='14px sans-serif';let h='';for(let i=0;i<hero.maxHp;i++)h+=(i<hero.hp?'❤️':'🖤');
  if(hero.shieldMax>0){h+=' ';for(let i=0;i<hero.shieldMax;i++)h+=(i<hero.shield?'🛡️':'  ')}
  ctx.fillText(h,W-10,by+14);
  if(hero.augs.length>0){ctx.textAlign='left';ctx.font='11px sans-serif';const u=[...new Set(hero.augs)];
    u.forEach((uid,i)=>{const up=HERO_AUGS.find(a=>a.id===uid);if(!up)return;const c=hero.augs.filter(id=>id===uid).length;ctx.fillText(up.icon+(c>1?'×'+c:''),10+i*36,by+42)})}}

function drawMUI(){ctx.fillStyle='rgba(20,8,8,.92)';ctx.fillRect(0,0,W,M_UI);
  ctx.strokeStyle='rgba(255,80,40,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,M_UI);ctx.lineTo(W,M_UI);ctx.stroke();
  ctx.save();ctx.translate(W/2,M_UI/2);ctx.rotate(PI);ctx.translate(-W/2,-M_UI/2);
  const by=4,cfg=getRoundCfg(round);
  for(let i=0;i<master.spells.length;i++){const sp=master.spells[i],bx=8+i*54,bsz=44,cu=sp.cdT<=0&&master.mana>=sp.cost,sel=master.spellMode===i;
    ctx.fillStyle=sel?'rgba(255,120,40,.3)':cu?'rgba(80,20,20,.8)':'rgba(30,15,15,.8)';rr(ctx,bx,by,bsz,bsz,8);ctx.fill();
    ctx.strokeStyle=sel?'#fd0':cu?'rgba(255,80,40,.5)':'rgba(255,255,255,.1)';ctx.lineWidth=sel?2.5:1;rr(ctx,bx,by,bsz,bsz,8);ctx.stroke();
    ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(sp.icon,bx+bsz/2,by+bsz/2-2);
    ctx.fillStyle=cu?'#f84':'#644';ctx.font='bold 8px sans-serif';ctx.fillText(sp.cost+'💎',bx+bsz/2,by+bsz-5);
    if(sp.cdT>0){ctx.fillStyle='rgba(0,0,0,.6)';rr(ctx,bx,by,bsz,bsz*(sp.cdT/sp.cd),8);ctx.fill();ctx.fillStyle='#f88';ctx.font='bold 11px sans-serif';ctx.fillText(Math.ceil(sp.cdT/60)+'s',bx+bsz/2,by+bsz/2)}}
  const spellW=master.spells.length*54+8;
  const mX=spellW+10,mW=W-spellW-120,mH=12;
  ctx.fillStyle='rgba(255,255,255,.08)';rr(ctx,mX,by+2,mW,mH,6);ctx.fill();
  const mg=ctx.createLinearGradient(mX,0,mX+mW,0);mg.addColorStop(0,'#8844ff');mg.addColorStop(1,'#cc44ff');ctx.fillStyle=mg;
  rr(ctx,mX,by+2,mW*Math.min(1,master.mana/master.maxMana),mH,6);ctx.fill();
  ctx.fillStyle='#daf';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('💎 '+Math.floor(master.mana)+'/'+master.maxMana,mX+mW/2,by+mH+12);
  ctx.fillStyle='#f66';ctx.font='bold 11px sans-serif';ctx.fillText('👹 '+nameEntry.master.name+' R'+round+'/'+maxRounds,mX+mW/2,by+mH+26);
  // Deck display
  ctx.fillStyle='#a88';ctx.font='8px sans-serif';
  const deckStr=master.deck.filter(k=>k).map(k=>MONS[k]?MONS[k].icon:'?').join(' ');
  ctx.fillText('Deck: '+deckStr,mX+mW/2,by+mH+38);
  const bbSz=48;
  if(master.bossActive&&bossAbils.length>0){const aw=50,ah=52,agap=5,ax0=W-aw-10-(bossAbils.length-1)*(aw+agap);
    for(let i=0;i<bossAbils.length;i++){const ab=bossAbils[i],abx=ax0+i*(aw+agap),aby=by;const cu=ab.charges>0&&ab.cdT<=0;
      ctx.fillStyle=cu?'rgba(120,30,30,.85)':'rgba(30,15,15,.7)';rr(ctx,abx,aby,aw,ah,8);ctx.fill();
      ctx.strokeStyle=cu?'rgba(255,100,40,.6)':'rgba(255,255,255,.08)';ctx.lineWidth=cu?2:1;rr(ctx,abx,aby,aw,ah,8);ctx.stroke();
      if(ab.cdT>0){ctx.fillStyle='rgba(0,0,0,.5)';rr(ctx,abx,aby,aw,ah*(ab.cdT/ab.cd),8);ctx.fill();
        ctx.fillStyle='#f88';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(Math.ceil(ab.cdT/60)+'s',abx+aw/2,aby+ah/2)}
      ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ab.icon,abx+aw/2,aby+ah/2-(ab.cdT>0?8:2));
      ctx.fillStyle=cu?'#fda':'#644';ctx.font='bold 7px sans-serif';ctx.fillText(ab.charges+'×',abx+aw/2,aby+ah-6)}
    ctx.fillStyle='#f84';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('👑 '+((boss&&boss.name)||'Boss'),ax0-10,by+ah/2+2);
  }else{const cards=cfg.available,cw=46,ch=48,cgap=4,cx0=W-bbSz-16-cards.length*(cw+cgap);
    for(let i=0;i<cards.length;i++){const mk=cards[i],md=MONS[mk],bx=cx0+i*(cw+cgap),mc=Math.max(1,md.cost-mBuf.costReduc),cu=master.mana>=mc&&master.canSpawn,sel=master.selectedCard===i;
      ctx.fillStyle=sel?'rgba(255,200,40,.15)':cu?'rgba(60,20,40,.8)':'rgba(25,12,18,.8)';rr(ctx,bx,by,cw,ch,6);ctx.fill();
      ctx.strokeStyle=sel?'#fd0':cu?'rgba(255,100,60,.4)':'rgba(255,255,255,.08)';ctx.lineWidth=sel?2.5:1;rr(ctx,bx,by,cw,ch,6);ctx.stroke();
      ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(md.icon,bx+cw/2,by+ch/2-4);
      ctx.fillStyle=cu?'#f84':'#533';ctx.font='bold 7px sans-serif';ctx.fillText(mc+'💎',bx+cw/2,by+ch-6)}
    const bbX=W-bbSz-6,bbY=by+2;
    if(master.bossReady){const pulse=.6+Math.sin(gameTime*.1)*.3;ctx.fillStyle='rgba(200,30,30,'+pulse.toFixed(2)+')';rr(ctx,bbX,bbY,bbSz,bbSz,10);ctx.fill();ctx.strokeStyle='#f44';ctx.lineWidth=2;rr(ctx,bbX,bbY,bbSz,bbSz,10);ctx.stroke();
      ctx.font='22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',bbX+bbSz/2,bbY+bbSz/2-2);ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.fillText('BOSS',bbX+bbSz/2,bbY+bbSz-5)}
    else{ctx.fillStyle='rgba(40,15,15,.6)';rr(ctx,bbX,bbY,bbSz,bbSz,10);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;rr(ctx,bbX,bbY,bbSz,bbSz,10);ctx.stroke();
      ctx.fillStyle='#555';ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',bbX+bbSz/2,bbY+bbSz/2-2);
      ctx.fillStyle='#666';ctx.font='bold 7px sans-serif';ctx.fillText(Math.max(0,Math.ceil((1200-roundTimer)/60))+'s',bbX+bbSz/2,bbY+bbSz-5)}}
  if(master.augs.length>0){ctx.textAlign='left';ctx.font='10px sans-serif';const u=[...new Set(master.augs)];let ax=8;
    u.forEach(uid=>{const up=[...MASTER_AUGS,...MON_UNLOCKS].find(a=>a.id===uid);if(!up)return;const c=master.augs.filter(id=>id===uid).length;ctx.fillText(up.icon+(c>1?'×'+c:''),ax,by+M_UI-12);ax+=34})}
  ctx.restore()}

function drawMidGame(){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#fd0';ctx.font='bold 22px sans-serif';ctx.fillText('🏁 MANCHE 1 TERMINÉE',W/2,MID-60);
  const g=game1;ctx.fillStyle='#aaa';ctx.font='14px sans-serif';
  ctx.fillText('🏹 '+g.heroName+(g.won?' a survécu!':' est tombé R'+g.roundReached),W/2,MID-25);
  ctx.fillText('👹 '+g.masterName+' — '+g.kills+' kills | Nv.'+g.lvl,W/2,MID);
  ctx.fillText('⏱️ '+Math.floor(g.time/60)+'s',W/2,MID+25);
  ctx.fillStyle='rgba(255,200,60,.25)';rr(ctx,W/2-120,MID+70,240,50,12);ctx.fill();ctx.strokeStyle='#fd0';ctx.lineWidth=2;rr(ctx,W/2-120,MID+70,240,50,12);ctx.stroke();
  ctx.fillStyle='#fd0';ctx.font='bold 16px sans-serif';ctx.fillText('▶ MANCHE 2 — ÉCHANGE!',W/2,MID+95)}

function drawFinalResult(){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#fd0';ctx.font='bold 24px sans-serif';ctx.fillText('🏆 RÉSULTAT FINAL',W/2,MID-90);
  const drawG=(g,y,n)=>{ctx.fillStyle='#ccc';ctx.font='bold 14px sans-serif';
    ctx.fillText('Manche '+n+': 🏹'+g.heroName+' vs 👹'+g.masterName,W/2,y);
    ctx.fillStyle='#aaa';ctx.font='12px sans-serif';
    ctx.fillText((g.won?'🏹 Héros gagne!':'👹 Maître gagne!')+' — R'+g.roundReached+' | '+g.kills+' kills | Nv.'+g.lvl+' | '+Math.floor(g.time/60)+'s',W/2,y+22)};
  drawG(game1,MID-40,1);drawG(game2,MID+10,2);
  let winner='';if(game1.won&&!game2.won)winner=playerBottom+' 🏆';else if(!game1.won&&game2.won)winner=playerTop+' 🏆';
  else if(game1.won===game2.won){winner=game1.roundReached>game2.roundReached?playerBottom:game2.roundReached>game1.roundReached?playerTop:'Égalité!'}
  else winner='Égalité!';
  ctx.fillStyle='#fd0';ctx.font='bold 18px sans-serif';ctx.fillText('👑 '+winner,W/2,MID+60);
  ctx.fillStyle='rgba(255,200,60,.2)';rr(ctx,W/2-100,MID+90,200,50,12);ctx.fill();ctx.strokeStyle='#fd0';ctx.lineWidth=2;rr(ctx,W/2-100,MID+90,200,50,12);ctx.stroke();
  ctx.fillStyle='#fd0';ctx.font='bold 14px sans-serif';ctx.fillText('▶ REJOUER',W/2,MID+115)}

// UTILS
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}
function wt(c,t,x,y,mw,lh){const w=t.split(' ');let l='';for(const s of w){const ts=l+s+' ';if(c.measureText(ts).width>mw&&l){c.fillText(l,x,y);y+=lh;l=s+' '}else l=ts}c.fillText(l,x,y)}

function mainLoop(){try{update()}catch(e){console.error(e)}draw();requestAnimationFrame(mainLoop)}
calcArena();requestAnimationFrame(mainLoop);
</script>
