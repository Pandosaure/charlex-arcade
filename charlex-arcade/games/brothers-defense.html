function drawVictory(){
  victoryTime++;
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  // Fireworks
  for(let i=0;i<12;i++){
    const fx=W*.1+Math.sin(victoryTime*.017+i*.85)*W*.4+W*.4;
    const fy=H*.08+Math.cos(victoryTime*.023+i*1.2)*H*.12+H*.08;
    const hue=(victoryTime*3+i*22)%360;
    for(let j=0;j<6;j++){
      const fa=j*Math.PI/3+victoryTime*.03+i*.5;const r2=6+Math.sin(victoryTime*.05+j+i)*6;
      ctx.fillStyle=`hsl(${hue},80%,${55+j*5}%)`;ctx.beginPath();ctx.arc(fx+Math.cos(fa)*r2,fy+Math.sin(fa)*r2,2,0,Math.PI*2);ctx.fill()}}
  // Confetti
  for(let i=0;i<20;i++){
    const cx2=((victoryTime*1.3+i*47)%W);const cy2=((victoryTime*.8+i*31)%H);
    ctx.fillStyle=`hsl(${(i*37)%360},70%,60%)`;ctx.fillRect(cx2,cy2,4,3)}

  const w=P[winner],l=P[1-winner];
  const wN=w.name||`Joueur ${winner+1}`,lN=l.name||`Joueur ${2-winner}`;

  // ---- HELPER: draw one player's endgame panel ----
  function drawPlayerPanel(pid,yTop,yBot){
    const p=P[pid];const isWinner=pid===winner;
    const pN=p.name||`Joueur ${pid+1}`;
    const panelH=yBot-yTop;const fs=Math.min(16,W*.035);
    const rotated=pid===1;

    ctx.save();
    if(rotated){ctx.translate(W,yTop+panelH);ctx.scale(-1,-1);ctx.translate(0,0)}

    const baseY=rotated?0:yTop;
    // Taunting message
    const msg=isWinner?victoryWinMsg:victoryLoseMsg;
    const msgCol=isWinner?'#fd0':'#f66';
    ctx.fillStyle=msgCol;ctx.font=`bold ${fs*1.1}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(msg,W/2,baseY+panelH*.08);

    // Sub-message
    ctx.fillStyle=isWinner?'#4f4':'#f88';ctx.font=`${fs*.7}px sans-serif`;
    const sub=isWinner?`🏆 VICTOIRE — Vague ${waveNum}`:`💀 DÉFAITE — Vague ${waveNum}`;
    ctx.fillText(sub,W/2,baseY+panelH*.15);

    // Stats table
    const tX=W*.06,tW2=W*.88,tTop=baseY+panelH*.2,tH2=panelH*.68;
    ctx.fillStyle='rgba(20,20,40,.8)';ctx.beginPath();ctx.roundRect(tX,tTop,tW2,tH2,8);ctx.fill();
    ctx.strokeStyle=isWinner?'rgba(255,215,0,.3)':'rgba(255,80,80,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(tX,tTop,tW2,tH2,8);ctx.stroke();

    // Player name header
    ctx.fillStyle=isWinner?'#fd0':'#f88';ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(`${isWinner?'👑':'💀'} ${pN} ${isWinner?'👑':'💀'}`,W/2,tTop+fs*1.2);

    const opp=P[1-pid];
    const myTow=towers.filter(t=>t.owner===pid).length;
    const myTS=towers.filter(t=>t.owner===pid).reduce((s,t)=>s+t.level+1,0);
    const mySpec=Object.values(p.specBuilt).filter(Boolean).length;

    const stats=[
      ['❤️ Vie',`${Math.floor(p.hp)}/${p.maxHp}`],
      ['💰 Or gagné',p.stats.goldEarned],
      ['💰 Or dépensé',p.stats.goldSpent],
      ['⚔️ Unités envoyées',p.stats.unitsSpawned],
      ['💀 Ennemis tués',p.stats.killCount],
      ['🏰 Tours',`${myTow} (⭐${myTS})`],
      ['🔓 Spéciales',mySpec],
      ['👑 Boss tués',p.stats.bossKills],
      ['🔥 Légendaires',p.stats.legendarySpawned],
      ['⚔️ Spéciaux',p.stats.specialsSpawned],
      ['🎁 Bonus',p.stats.dropsCollected],
      ['📈 Éco',`Niv.${p.ecoLvl+1}`],
    ];
    const rf=Math.min(11,fs*.7);const rowH=Math.min(rf*1.7,(tH2-fs*2.5)/stats.length);
    let ry=tTop+fs*2.2;
    ctx.font=`${rf}px sans-serif`;
    stats.forEach((row,idx)=>{
      if(idx%2===0){ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(tX+4,ry-rowH*.35,tW2-8,rowH)}
      ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText(row[0],tX+12,ry);
      ctx.fillStyle='#fff';ctx.textAlign='right';ctx.fillText(String(row[1]),tX+tW2-12,ry);
      ry+=rowH;
    });

    ctx.restore();
  }

  // Divider line
  ctx.strokeStyle='rgba(255,215,0,.4)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W*.1,MID);ctx.lineTo(W*.9,MID);ctx.stroke();

  // Draw each player's panel on their side
  // P1 = bottom half, P2 = top half
  drawPlayerPanel(0,MID+2,H);
  drawPlayerPanel(1,0,MID-2);

  // Replay button — center, appears after 5 seconds
  if(victoryTime>=300){
    const pulse=.5+Math.sin(victoryTime*.08)*.5;
    const btnW=W*.5,btnH=40,btnX=(W-btnW)/2,btnY=MID-20;
    ctx.fillStyle=`rgba(40,120,255,${.7+pulse*.3})`;ctx.beginPath();ctx.roundRect(btnX,btnY,btnW,btnH,12);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(btnX,btnY,btnW,btnH,12);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(16,W*.035)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🔄 REJOUER',W/2,MID);
  }else{
    // Countdown
    const sLeft=Math.ceil((300-victoryTime)/60);
    ctx.fillStyle='#666';ctx.font=`${Math.min(12,W*.025)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`Rejouer dans ${sLeft}s...`,W/2,MID);
  }
}

// ---- NAME SELECT SCREEN ----
function doNameSelect(tx,ty){
  const bw=Math.min(100,W*.2),bh=36,gap=8;
  const namesPerRow=Math.min(PLAYER_NAMES.length,4);
  const totalW=namesPerRow*(bw+gap)-gap;
  for(let pid=0;pid<2;pid++){
    if(P[pid].name)continue;
    const baseY=pid===0?H*.62:H*.18;
    let htx=tx,hty=ty;
    if(pid===1){htx=W-tx;hty=H*.36-ty+H*.18}// mirror for P2 rotation
    for(let i=0;i<PLAYER_NAMES.length;i++){
      const row=Math.floor(i/namesPerRow),col=i%namesPerRow;
      const bx=W/2-totalW/2+col*(bw+gap),by=baseY+row*(bh+gap);
      if(htx>=bx&&htx<=bx+bw&&hty>=by&&hty<=by+bh){
        // Check name not taken by other player
        if(P[1-pid].name===PLAYER_NAMES[i]){sfx(150,.1,'sawtooth');return}
        P[pid].name=PLAYER_NAMES[i];sfx(550,.15,'sine');
        if(P[0].name&&P[1].name)phase='powerSelect';
        return;
      }
    }
  }
}
function drawNameSelect(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  const bw=Math.min(100,W*.2),bh=36,gap=8;
  const namesPerRow=Math.min(PLAYER_NAMES.length,4);
  const totalW=namesPerRow*(bw+gap)-gap;
  for(let pid=0;pid<2;pid++){
    const p=P[pid];const baseY=pid===0?H*.62:H*.18;
    if(pid===1){ctx.save();ctx.translate(W/2,H*.27);ctx.rotate(Math.PI);ctx.translate(-W/2,-H*.27)}
    ctx.fillStyle=p.name?'#4a4':'#fd0';ctx.font=`bold ${Math.min(20,W*.04)}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(p.name?`✅ ${p.name}`:`Joueur ${pid+1}: Choisis ton nom`,W/2,baseY-22);
    for(let i=0;i<PLAYER_NAMES.length;i++){
      const row=Math.floor(i/namesPerRow),col=i%namesPerRow;
      const bx=W/2-totalW/2+col*(bw+gap),by=baseY+row*(bh+gap);
      const taken=P[1-pid].name===PLAYER_NAMES[i];const sel=p.name===PLAYER_NAMES[i];
      ctx.fillStyle=sel?'rgba(30,80,30,.9)':taken?'rgba(50,20,20,.7)':'rgba(20,25,40,.9)';
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.fill();
      ctx.strokeStyle=sel?'#4f4':taken?'#633':'#445';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.stroke();
      ctx.fillStyle=sel?'#4f4':taken?'#644':'#ddd';ctx.font=`bold ${Math.min(14,bw*.14)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(PLAYER_NAMES[i],bx+bw/2,by+bh/2);
    }
    if(pid===1)ctx.restore();
  }
}

function loadLeaderboard(){try{return JSON.parse(localStorage.getItem('bd_leaderboard'))||[]}catch(e){return[]}}
function saveLeaderboard(lb){try{localStorage.setItem('bd_leaderboard',JSON.stringify(lb.slice(0,10)))}catch(e){}}
function addToLeaderboard(name,diff,stars,level){
  const lb=loadLeaderboard();
  // Replace existing entry for same player+difficulty if new score is better
  const existing=lb.findIndex(e=>e.name===name&&e.diff===diff);
  if(existing>=0){
    if(stars>lb[existing].stars||(stars===lb[existing].stars&&level>lb[existing].level)){
      lb[existing]={name,diff,stars,level,date:Date.now()};
    }
  }else{
    lb.push({name,diff,stars,level,date:Date.now()});
  }
  lb.sort((a,b)=>b.stars-a.stars||(b.level-a.level));
  saveLeaderboard(lb.slice(0,10));
}

function soloGetNodeLevel(nk){return soloState?.nodeLevel[nk]||0}
function soloNodeCost(nk){
  const node=SKILL_TREE[nk];if(!node)return 999;
  const cur=soloGetNodeLevel(nk);
  if(cur>=node.levels.length)return 0;
  return node.levels[cur].cost;
}
function soloNodeAvailable(nk){
  const node=SKILL_TREE[nk];if(!node)return false;
  const cur=soloGetNodeLevel(nk);
  if(cur>=node.levels.length)return false;
  // Hidden nodes: check if revealed
  if(node.hidden&&nk==='citadel'&&!soloState.citadelRevealed)return false;
  // Exclusive (ultimate): only 1 choice allowed
  if(node.exclusive==='ultimate'){
    if(soloState.ultimateChosen&&soloState.ultimateChosen!==nk)return false;
  }
  if(!node.req)return true;
  return node.req.every(r=>soloGetNodeLevel(r.node)>=r.minLvl);
}
function soloApplySkillTree(){
  if(!soloState)return;
  soloState.maxTowerLvl={};soloState.passives=[];soloState.capstones=[];soloState.powerLvl=0;
  // Check citadel reveal
  const basesAt2=['archer','fire','ice','lightning'].every(k=>soloGetNodeLevel(k)>=2);
  if(basesAt2&&!soloState.citadelRevealed){

    addFloat(W/2,H*.3,'👑 CITADELLE DÉBLOQUÉE!','#fd0');sfx(880,.3,'sine',.15);
  }
  for(const[nk,node]of Object.entries(SKILL_TREE)){
    const lvl=soloGetNodeLevel(nk);if(lvl<=0)continue;
    if(node.type==='tower'){
      const cur=soloState.maxTowerLvl[node.tower]??-1;
      soloState.maxTowerLvl[node.tower]=Math.max(cur,lvl-1);
    }
    if(node.type==='passive')soloState.passives.push(node.effect);
    if(node.type==='capstone')soloState.capstones.push(node.effect);
    if(node.type==='ultimate')soloState.ultimateChosen=nk;
    if(node.type==='power'&&soloState.power===node.power)soloState.powerLvl=lvl;
  }
}

// ---- SOLO MAP BUILDER ----
function buildSoloGrid(levelNum){
  const diff=soloState.diff;const lvl=SOLO_LEVELS[levelNum-1];
  grid=[];for(let r=0;r<GROWS;r++){grid[r]=[];for(let c=0;c<GCOLS;c++)grid[r][c]=0}
  pathCells=[];towerSpots=[];fullPaths=[];bPaths=[];
  const M=1;if(GROWS<6||GCOLS<6)return;
  const cL=Math.floor(GCOLS*.15),cR=Math.ceil(GCOLS*.85);
  for(let c=cL;c<cR;c++){grid[GROWS-1][c]=2;grid[GROWS-2][c]=2}
  const startR=2;const endR=GROWS-3;if(endR<=startR+2)return;
  let nPaths=diff.paths;
  if(diff.key==='geek'&&lvl.pathsGeek)nPaths=lvl.pathsGeek;
  const usableW=GCOLS-M*2-2;let startCols=[];
  if(nPaths===1)startCols=[M+1+Math.floor(usableW/2)];
  else{const th=Math.floor(usableW/3);startCols=[M+1+Math.floor(Math.random()*th)+2,M+1+th*2+Math.floor(Math.random()*th)]}
  startCols.forEach(sc=>{
    const path=[];let c=sc,r=startR;path.push({c,r});grid[r][c]=1;
    let hDir=Math.random()<.5?1:-1;let iters=0;
    while(r<endR&&iters<300){iters++;
      const maxH=Math.floor(3+Math.random()*(GCOLS*.4));
      for(let i=0;i<maxH;i++){const nc=c+hDir;if(nc<M||nc>GCOLS-M-1)break;
        if(soloCanPlacePath(nc,r,c,r)){c=nc;path.push({c,r});grid[r][c]=1}else break}
      if(r>=endR)break;const vLen=2+Math.floor(Math.random()*3);
      for(let i=0;i<vLen&&r<endR;i++){if(soloCanPlacePath(c,r+1,c,r)){r++;path.push({c,r});grid[r][c]=1}else break}
      hDir*=-1;
    }
    let stuck=0;while(r<endR&&stuck<50){stuck++;
      if(soloCanPlacePath(c,r+1,c,r)){r++;path.push({c,r});grid[r][c]=1}
      else{const d=Math.random()<.5?1:-1;
        if(soloCanPlacePath(c+d,r,c,r)){c+=d;path.push({c,r});grid[r][c]=1}
        else{r++;if(inGrid(c,r)){path.push({c,r});grid[r][c]=1}}}}
    if(path.length>3)bPaths.push(path);
  });
  for(let r2=0;r2<GROWS;r2++)for(let c2=0;c2<GCOLS;c2++)if(grid[r2][c2]===1)pathCells.push({c:c2,r:r2});
  bPaths.forEach(bPath=>{
    const wp=[];wp.push({x:gx(bPath[0].c),y:GY0-CELL});
    bPath.forEach(p=>wp.push({x:gx(p.c),y:gy(p.r)}));
    wp.push({x:gx(bPath[bPath.length-1].c),y:gy(GROWS-2)});
    fullPaths.push({owner:1,wp});
  });
  const spotSet=new Set();
  for(let r2=0;r2<GROWS;r2++)for(let c2=0;c2<GCOLS;c2++){
    if(grid[r2][c2]!==0)continue;let nearPath=false;
    for(const[dc,dr]of[[0,-1],[0,1],[-1,0],[1,0]]){const nc=c2+dc,nr=r2+dr;if(inGrid(nc,nr)&&grid[nr][nc]===1)nearPath=true}
    if(nearPath){const key=`${c2},${r2}`;
      if(!spotSet.has(key)){spotSet.add(key);towerSpots.push({c:c2,r:r2,owner:0,tower:null});grid[r2][c2]=3}}}
  let filtered=[];
  towerSpots.forEach(s=>{const nb=towerSpots.filter(o=>o!==s&&Math.abs(o.c-s.c)<=1&&Math.abs(o.r-s.r)<=1).length;
    if(nb<4||Math.random()<.5)filtered.push(s);else grid[s.r][s.c]=0});
  towerSpots=filtered;soloGuaranteeMegaSpots();
  // Generate decorations
  if(soloState)soloState._decorations=generateDecorations(SOLO_LEVELS[levelNum-1].envData);
}
function soloCanPlacePath(c,r,pc,pr){
  if(!inGrid(c,r))return false;if(grid[r][c]===1||grid[r][c]===2)return false;
  let adj=0;
  for(const[dc,dr]of[[-1,0],[1,0],[0,-1],[0,1]]){const nc=c+dc,nr=r+dr;
    if(inGrid(nc,nr)&&grid[nr][nc]===1&&!(nc===pc&&nr===pr))adj++}
  return adj<2;
}
function soloGuaranteeMegaSpots(){
  let count=0;const sSet=new Set(towerSpots.map(s=>`${s.c},${s.r}`));
  for(const s of towerSpots){if(sSet.has(`${s.c+1},${s.r}`)&&sSet.has(`${s.c},${s.r+1}`)&&sSet.has(`${s.c+1},${s.r+1}`))count++}
  let needed=2-count;let attempts=0;
  while(needed>0&&attempts<30){attempts++;
    const anchor=pathCells[Math.floor(Math.random()*pathCells.length)];if(!anchor)break;
    for(const[dc,dr]of[[-1,-1],[-1,0],[0,-1],[0,0],[1,0],[0,1]]){
      const corners=[[anchor.c+dc,anchor.r+dr],[anchor.c+dc+1,anchor.r+dr],[anchor.c+dc,anchor.r+dr+1],[anchor.c+dc+1,anchor.r+dr+1]];
      const ok=corners.every(([c,r])=>inGrid(c,r)&&grid[r][c]!==1&&grid[r][c]!==2);
      if(!ok)continue;
      const hasAdj=corners.some(([c,r])=>{for(const[dc2,dr2]of[[0,-1],[0,1],[-1,0],[1,0]]){const nc=c+dc2,nr=r+dr2;if(inGrid(nc,nr)&&grid[nr][nc]===1)return true}return false});
      if(!hasAdj)continue;
      corners.forEach(([c,r])=>{if(grid[r][c]!==3){grid[r][c]=3;if(!towerSpots.find(s=>s.c===c&&s.r===r))towerSpots.push({c,r,owner:0,tower:null})}});
      needed--;break;
    }
  }
}

// ---- SOLO WAVE SPAWNING ----
function getSoloWaveComp(levelNum,waveInLevel){
  const lvl=SOLO_LEVELS[levelNum-1];if(!lvl)return[];
  const pool=lvl.monsterPool;const diff=soloState.diff;
  const hpM=lvl.hpScale*diff.hpMult;const spdM=diff.spdMult;
  const hpScale=levelNum<=2?.5:levelNum<=5?.7:1;
  // 5 waves, each ~3x bigger than old 10-wave system
  // Wave size ramps: w1=small intro, w2=medium, w3=big+miniboss, w4=big, w5=huge+boss
  const waveSizes=[1, 1.4, 1.8, 2.2, 2.8];
  const baseCount=Math.floor((10+Math.floor(levelNum*2))*waveSizes[waveInLevel-1]);
  // Pick ALL available types and mix them
  const nTypes=Math.min(pool.length, Math.max(2, 1+Math.floor(waveInLevel*pool.length/5)));
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const chosen=shuffled.slice(0,nTypes);
  const comp=[];
  chosen.forEach(k=>{
    const ml=Math.min(4,Math.floor(levelNum/4));
    const perType=Math.max(2,Math.ceil(baseCount/chosen.length));
    // Spawn delay: wider spacing to reduce AoE clumping (18-28 frames)
    const spawnDelay=Math.max(14,22-Math.floor(waveInLevel)+Math.floor(Math.random()*8));
    comp.push({k,l:ml,n:perType,d:spawnDelay,hpM:hpM*hpScale,spdM});
  });
  return comp;
}
// Shuffle wave queue so types are interleaved (not blocks of same type)
function shuffleWaveQueue(queue){
  // Extract all units into a flat list, keeping non-unit items at end
  const units=[];const specials=[];
  queue.forEach(item=>{
    if(item.type==='unit'){
      for(let i=0;i<item.n;i++)units.push({type:'spawn',k:item.k,l:item.l,d:item.d,hpM:item.hpM,spdM:item.spdM});
    }else specials.push(item);
  });
  // Fisher-Yates shuffle
  for(let i=units.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[units[i],units[j]]=[units[j],units[i]]}
  return[...units,...specials];
}
function startSoloWave(){
  if(soloState.waveSpawning||soloState.wave>=5)return;
  soloState.wave++;soloState.waveSpawning=true;soloState.spawnTimer=0;
  soloState.waveQueue=[];soloState.waveCompleted=false;
  soloState.waveStartFrame=gameTime;// track when this wave started
  const w=soloState.wave;const lv=soloState.level;
  const comp=getSoloWaveComp(lv,w);
  comp.forEach(g=>soloState.waveQueue.push({type:'unit',k:g.k,l:g.l,n:g.n,d:g.d,hpM:g.hpM,spdM:g.spdM}));
  // Wave 3: mini-boss
  if(w===3){
    const lvl=SOLO_LEVELS[lv-1];
    soloState.waveQueue.push({type:'miniboss',boss:lvl.boss,hpMult:lvl.miniBossHpMult,dmgMult:lvl.miniBossDmgMult});
    addFloat(W/2,H*.3,'⚠️ MINI-BOSS!','#f80');sfx(200,.3,'sawtooth',.15);
  }
  // Wave 5: BOSS + extra escort
  else if(w===5){
    const lvl=SOLO_LEVELS[lv-1];
    soloState.waveQueue.push({type:'boss',boss:lvl.boss});
    addFloat(W/2,H*.3,'⚠️ BOSS FINAL ⚠️','#f22');sfx(150,.4,'sawtooth',.2);
  }
  // Elites from level 2, wave 2+
  else if(w>=2&&lv>=2){

function drawTowerTree(top,fs){

function generateDecorations(env){
  const decs=[];const maxDec=12+Math.floor(Math.random()*8);
  const occupied=new Set();
  pathCells.forEach(p=>occupied.add(`${p.c},${p.r}`));
  towerSpots.forEach(s=>occupied.add(`${s.c},${s.r}`));
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++)if(grid[r][c]===2)occupied.add(`${c},${r}`);
  
  for(let i=0;i<maxDec*3&&decs.length<maxDec;i++){
    const c=1+Math.floor(Math.random()*(GCOLS-2));
    const r=2+Math.floor(Math.random()*(GROWS-4));
    if(occupied.has(`${c},${r}`))continue;
    // Don't place too close to path
    let nearPath=false;
    for(const[dc,dr]of[[0,0],[0,-1],[0,1],[-1,0],[1,0]]){
      if(occupied.has(`${c+dc},${r+dr}`)){nearPath=true;break}}
    if(nearPath&&Math.random()<.7)continue;
    
    const x=GX0+c*CELL+CELL/2+(Math.random()-.5)*CELL*.4;
    const y=GY0+r*CELL+CELL/2+(Math.random()-.5)*CELL*.4;
    const sz=.6+Math.random()*.6;
    const rot=Math.random()*6.28;
    
    if(env.key==='forest'){
      decs.push({x,y,sz,rot,type:Math.random()<.6?'tree':'bush'});
    }else if(env.key==='ice'){
      decs.push({x,y,sz,rot,type:Math.random()<.5?'crystal':'snowpile'});
    }else if(env.key==='volcano'){
      decs.push({x,y,sz,rot,type:Math.random()<.5?'lavarock':'crack'});
    }else if(env.key==='cemetery'){

    }else if(d.type==='flame'){

      ctx.fillStyle=`rgba(255,100,0,${fa})`;ctx.beginPath();ctx.arc(d.x,d.y,s*.25+Math.sin(t*.1+d.rot)*s*.1,0,Math.PI*2);ctx.fill();

// ---- SOLO INPUT ----
function doSoloScreen(tx,ty){
  if(soloPhase==='leaderboard'){
    const bw=Math.min(280,W*.65),bh=50,bx=W/2-bw/2,by=H*.82;
    if(tx>=bx&&tx<=bx+bw&&ty>=by&&ty<=by+bh){soloPhase='difficulty';sfx(440,.15);return}
    return;
  }
  if(soloPhase==='difficulty'){
    const bw=Math.min(300,W*.75),bh=Math.min(90,H*.14),gap=15;
    for(let i=0;i<3;i++){const bx=W/2-bw/2,by=H*.2+i*(bh+gap);
      if(tx>=bx&&tx<=bx+bw&&ty>=by&&ty<=by+bh){soloState=initSoloState(SOLO_DIFFICULTIES[i].key);_kbName='';sfx(440,.15,'sine');soloPhase='name';return}}
    return;
  }
  if(soloPhase==='name'){
    if(soloState.playerName&&soloState.playerName.length>=2){
      // Check if tap is in "continue" zone (bottom area)
      if(ty>=H*.7){soloPhase='power';sfx(440,.1);return}
    }
    const bw=Math.min(100,W*.22),bh=36,gap2=8;const npr=Math.min(PLAYER_NAMES.length,4);
    const totalW=npr*(bw+gap2)-gap2;const baseY=H*.35;
    for(let i=0;i<PLAYER_NAMES.length;i++){const row=Math.floor(i/npr),col=i%npr;
      const bx=W/2-totalW/2+col*(bw+gap2),by=baseY+row*(bh+gap2);
      if(tx>=bx&&tx<=bx+bw&&ty>=by&&ty<=by+bh){_kbName='';soloState.playerName=PLAYER_NAMES[i];sfx(330,.1);return}}
    return;
  }
  if(soloPhase==='power'){
    if(soloState.power){soloPhase='skillTree';sfx(440,.1);return}
    const bw=Math.min(280,W*.7),bh=Math.min(70,H*.11),gap3=12;
    const pows=['meteor','bastion','forge'];
    for(let i=0;i<3;i++){const bx=W/2-bw/2,by=H*.22+i*(bh+gap3);
      if(tx>=bx&&tx<=bx+bw&&ty>=by&&ty<=by+bh){
        soloState.power=pows[i];P[0]=mkP(0);P[0].name=soloState.playerName;P[0].powers=[pows[i]];P[0].pLvl=[0];P[0].pCd=[0,0];P[0].pReady=[true,false];
        sfx(440,.15);return}}
    return;
  }
  if(soloPhase==='skillTree'){doSkillTreeTap(tx,ty);return}
  if(soloPhase==='levelIntro'){soloPhase='playing';startSoloWave();sfx(440,.15);return}
  if(soloPhase==='levelComplete'){
    const bw=Math.min(220,W*.55),bh=45,gap=15,b1x=W/2-bw/2,b1y=H*.58;
    if(tx>=b1x&&tx<=b1x+bw&&ty>=b1y&&ty<=b1y+bh){if(soloState.level<20)soloState.level++;soloPhase='skillTree';sfx(440,.1);return}
    if(soloState.level<20){const b2y=b1y+bh+gap;
      if(tx>=b1x&&tx<=b1x+bw&&ty>=b2y&&ty<=b2y+bh){soloState.level++;startSoloLevel();return}}
    return;
  }
  if(soloPhase==='gameOver'){
    const bw=Math.min(200,W*.5),bh=45,bx=W/2-bw/2;
    if(ty>=H*.55&&ty<=H*.55+bh&&tx>=bx&&tx<=bx+bw){startSoloLevel();return}
    if(ty>=H*.55+bh+15&&ty<=H*.55+bh*2+15&&tx>=bx&&tx<=bx+bw){resetGame();return}
    return;
  }
  if(soloPhase==='playing'){
    // Handle pause overlay clicks
    if(soloPaused){
      const bw=Math.min(200,W*.5),bh=50,bx=W/2-bw/2;
      const by=soloState._pauseBtnY||H*.55;const by2=soloState._pauseBtn2Y||by+bh+15;
      if(tx>=bx&&tx<=bx+bw&&ty>=by&&ty<=by+bh){soloPaused=false;sfx(440,.1);return}
      if(tx>=bx&&tx<=bx+bw&&ty>=by2&&ty<=by2+bh){soloPaused=false;addToLeaderboard(soloState.playerName,soloState.diff.key,soloState.totalStars,soloState.level);resetGame();return}
      return;// ignore other taps when paused
    }
    doSoloGame(tx,ty);return
  }
}
function doSkillTreeTap(tx,ty){
  if(soloState.infoPopup){soloState.infoPopup=null;return}
  const tabH=soloState._stTabH||40;
  if(ty<tabH){soloState.skillTab=tx<W/2?0:1;sfx(330,.08);return}
  const btnY=soloState._stBtnY||H-50,btnH=soloState._stBtnH||38;
  const btnW=Math.min(200,W*.5),btnX=W/2-btnW/2;
  if(ty>=btnY&&ty<=btnY+btnH&&tx>=btnX&&tx<=btnX+btnW){soloApplySkillTree();startSoloLevel();return}
  if(soloState.skillTab===0){
    // Tower tree
    const pos=soloState._treePos;const nw=soloState._nodeW||52;const nh=soloState._nodeH||58;if(!pos)return;
    const allKeys=['archer','fire','ice','lightning','ballista','volcano','explosive','storm',
      'ult_warrior','ult_cataclysm','ult_elemental'];
    if(soloState.citadelRevealed)allKeys.push('citadel');
    for(const nk of allKeys){const p=pos[nk];if(!p)continue;
      const nx=p.x-nw/2,ny=p.y-nh/2;
      if(tx>=nx&&tx<=nx+nw&&ty>=ny&&ty<=ny+nh){
        const iR=Math.min(7,nw*.11);
        if(Math.hypot(tx-(nx+nw-iR-2),ty-(ny+nh-iR-2))<iR+8){soloState.infoPopup=nk;return}
        buyNodeLevel(nk);return}}
  }else{
    // Passive tree
    const nw=soloState._pNodeW||62;const nh=soloState._pNodeH||60;
    const allPassives=['p_gold','p_recycle','p_alch','p_bank','p_scout','p_surge','p_vamp','p_exec','p_fort','p_last'];
    const ecoKeys=['p_gold','p_recycle','p_alch','p_bank'];const combatKeys=['p_scout','p_surge','p_vamp','p_exec'];const survieKeys=['p_fort','p_last'];
    const top=soloState._pTop||80;const fs=Math.min(16,W*.038);const gap=6;
    const ecoX=W*.18;const comX=W*.82;const surX=W*.5;
    for(const nk of allPassives){
      let nx,ny;
      if(ecoKeys.includes(nk)){const i=ecoKeys.indexOf(nk);nx=ecoX-nw/2;ny=top+fs*1.2+i*(nh+gap)}
      else if(combatKeys.includes(nk)){const i=combatKeys.indexOf(nk);nx=comX-nw/2;ny=top+fs*1.2+i*(nh+gap)}
      else if(survieKeys.includes(nk)){const i=survieKeys.indexOf(nk);nx=surX-nw/2;ny=top+fs*1.2+(i+1)*(nh+gap)}
      else continue;
      if(tx>=nx&&tx<=nx+nw&&ty>=ny&&ty<=ny+nh){
        const iR=Math.min(7,nw*.11);
        if(Math.hypot(tx-(nx+nw-iR-2),ty-(ny+nh-iR-2))<iR+8){soloState.infoPopup=nk;return}
        buyNodeLevel(nk);return}
    }
    // Power upgrade boxes
    const powKey='pow_'+soloState.power;const powNode=SKILL_TREE[powKey];
    if(powNode&&soloState._powY){
      const pnw=soloState._powNW||nw*1.1;
      for(let i=0;i<powNode.levels.length;i++){
        const bx=W/2+(i-1)*(pnw+gap)-pnw/2;const by=soloState._powY;
        if(tx>=bx&&tx<=bx+pnw&&ty>=by&&ty<=by+nh*.6){
          const curLvl=soloGetNodeLevel(powKey);if(curLvl!==i){sfx(150,.08,'sawtooth');return}
          buyNodeLevel(powKey);return}}
    }
  }
}
function buyNodeLevel(nk){
  const node=SKILL_TREE[nk];if(!node)return;
  const lvl=soloGetNodeLevel(nk);
  if(lvl>=node.levels.length){sfx(150,.08,'sawtooth');return}
  if(!soloNodeAvailable(nk)){sfx(150,.1,'sawtooth');addFloat(W/2,H*.5,'🔒 Prérequis!','#f44');return}
  const cost=node.levels[lvl].cost;
  if(soloState.pendingStars<cost){sfx(150,.1,'sawtooth');addFloat(W/2,H*.5,'Pas assez d\'⭐!','#f44');return}
  soloState.nodeLevel[nk]=(lvl||0)+1;soloState.pendingStars-=cost;
  soloApplySkillTree();
  sfx(660,.2,'sine');addFloat(W/2,H*.4,`${node.icon} ${node.name} Niv.${lvl+1}!`,'#4f4');
}
function startSoloLevel(){
  const lvl=SOLO_LEVELS[soloState.level-1];
  soloApplySkillTree();
  towers=[];units=[];projs=[];effects=[];floats=[];drops=[];selectedTower=[null,null];
  combo=[0,0];comboT=[0,0];shakeT=[0,0];gameTime=0;gameSpeed=1;
  soloState.wave=0;soloState.waveSpawning=false;soloState.waveQueue=[];
  soloState.waveCompleted=false;soloState.waveInterval=0;
  soloState.kills=0;soloState.starsThisLevel=0;
  // HP persistence with regen between levels
  if(soloState.level===1){
    soloState.castleHp=soloState.diff.castleHp;soloState.castleMaxHp=soloState.diff.castleHp;
  }else{
    // Regen between levels
    const regenPct=soloState.diff.key==='noob'?.5:soloState.diff.key==='geek'?.3:.15;
    const hpLost=soloState.runCastleMaxHp-soloState.runCastleHp;
    const healed=Math.floor(hpLost*regenPct);
    soloState.castleHp=Math.min(soloState.runCastleMaxHp,soloState.runCastleHp+healed);
    soloState.castleMaxHp=soloState.runCastleMaxHp;
  }
  if(soloState.passives.includes('fortress')&&soloState.level===1){soloState.castleHp+=2000;soloState.castleMaxHp+=2000;
    soloState.runCastleMaxHp=soloState.castleMaxHp}
  const startGold=lvl.startGold+(soloState.passives.includes('start_gold')?50:0);
  P[0].gold=startGold;P[0].name=soloState.playerName;
  P[0].hp=soloState.castleHp;P[0].maxHp=soloState.castleMaxHp;
  P[0].powers=[soloState.power];P[0].pLvl=[soloState.powerLvl];P[0].pCd=[0,0];P[0].pReady=[true,false];
  P[0].specBuilt={ballista:false,volcano:false,storm:false,explosive:false};
  P[0].radialSpot=null;P[0].meteorPend=false;P[0].forgeT=0;P[0].bastionT=0;P[0].bastionCd=0;
  resize();buildSoloGrid(soloState.level);
  soloPhase='levelIntro';
}
function doSoloGame(tx,ty){
  const p=P[0];
  // Tap early start button (small, top-left, active during wave)
  if(soloState.wave>0&&soloState.wave<5&&soloState._earlyBtnH>0){
    const elapsed=gameTime-soloState.waveStartFrame;
    const earlyT=soloState.earlyStartThreshold;
    const maxT=soloState.waveIntervalMax;
    if(elapsed>=earlyT&&elapsed<maxT){
      const bx=soloState._earlyBtnX||4,by=soloState._earlyBtnY;
      const bw=soloState._earlyBtnW||110,bh=soloState._earlyBtnH;
      if(tx>=bx&&tx<=bx+bw&&ty>=by&&ty<=by+bh){
        const remaining=maxT-elapsed;
        const bonusGold=Math.floor(remaining/60*0.75*soloState.level);
        if(bonusGold>0){P[0].gold+=bonusGold;addFloat(W*.15,H*.12,`+${bonusGold}💰`,'#fd0');sfx(660,.2,'sine')}
        startSoloWave();return
      }
    }
  }
  // Speed toggle
  const botH=H-FB;
  if(ty>=FB+5&&ty<=H-5){
    // Pause button
    const pX=soloState._pauseX||W*.88,pS=soloState._pauseS||botH*.6;
    if(tx>=pX&&tx<=pX+pS){soloPaused=true;sfx(330,.08);return}
    const sW=40;if(tx>=W*.7&&tx<=W*.85){gameSpeed=gameSpeed===1?2:gameSpeed===2?3:1;sfx(440,.06);return}
  }
  // Power button
  if(soloState.power&&p.pReady[0]){
    const pbS=botH*.8,pbX=10,pbY=FB+(botH-pbS)/2;
    if(tx>=pbX&&tx<=pbX+pbS&&ty>=pbY&&ty<=pbY+pbS){
      const pk=soloState.power;
      if(pk==='meteor'){p.meteorPend=true;sfx(440,.15);return}
      if(pk==='forge'){const fl=POWERS.forge.lvl[p.pLvl[0]];p.forgeT=fl.dur;p.pReady[0]=false;p.pCd[0]=fl.cd;sfx(550,.2);addFloat(W/2,H*.4,'🔧 FORGE!','#f80');return}
      if(pk==='bastion'){const bl=POWERS.bastion.lvl[p.pLvl[0]];p.bastionT=bl.dur;p.bastionCd=0;p.pReady[0]=false;p.pCd[0]=bl.cd;sfx(550,.2);addFloat(W/2,H*.4,'🏰 BASTION!','#4f4');return}
    }
  }
  // Meteor placement
  if(p.meteorPend){
    const ml=POWERS.meteor.lvl[p.pLvl[0]];const r=ml.r*CELL;
    units.forEach(u=>{if(u.owner===0)return;if(Math.hypot(u.x-tx,u.y-ty)<r){u.hp-=ml.dmg}});
    effects.push({type:'aoe',x:tx,y:ty,r,life:25});
    if(ml.crater)effects.push({type:'crater',x:tx,y:ty,r:r*.8,life:ml.crater,owner:0});
    shakeT[0]=20;sfx(150,.3,'sawtooth',.2);p.meteorPend=false;p.pReady[0]=false;p.pCd[0]=ml.cd;return;
  }
  // Drops
  for(let di=drops.length-1;di>=0;di--){const d=drops[di];
    if(Math.hypot(tx-d.x,ty-d.y)<CELL*1.5){applyDrop(d,0);drops.splice(di,1);return}}
  // Radial/popup
  if(p.radialSpot){if(doSoloRadialTap(p,tx,ty))return;p.radialSpot=null;return}
  if(selectedTower[0]&&selectedTower[0].owner===0){if(doPopup(selectedTower[0],tx,ty))return}
  let tapped=null;
  for(const t of towers){if(t.owner!==0)continue;
    if(t.isMega){if(Math.hypot(t.x-tx,t.y-ty)<CELL*1.3){tapped=t;break}}
    else if(Math.hypot(t.x-tx,t.y-ty)<CELL*.7){tapped=t;break}}
  if(tapped){if(selectedTower[0]===tapped)selectedTower[0]=null;else{selectedTower[0]=tapped;sfx(330,.06)}return}
  selectedTower[0]=null;
  const cell=cellAt(tx,ty);
  const spot=towerSpots.find(s=>s.c===cell.c&&s.r===cell.r&&s.owner===0&&!s.tower&&!s.megaParent);
  if(spot){p.radialSpot={c:spot.c,r:spot.r};sfx(330,.06)}
}
function doSoloRadialTap(p,tx,ty){
  const sp=p.radialSpot;if(!sp)return false;
  let cx=gx(sp.c),cy=gy(sp.r);const R=CELL*3;const bs=CELL*1.2;
  const margin=R+bs*.6;cx=Math.max(margin,Math.min(W-margin,cx));cy=Math.max(FT+margin,Math.min(FB-margin,cy));
  if(Math.hypot(tx-cx,ty-cy)<bs*.6)return soloTryBuild(p,'citadel',sp);
  for(const sl of RADIAL_SLOTS){const ang=sl.a*Math.PI/180;const bx=cx+Math.cos(ang)*R,by=cy+Math.sin(ang)*R;
    if(Math.hypot(tx-bx,ty-by)<bs*.65)return soloTryBuild(p,sl.key,sp)}
  return false;
}
function soloTryBuild(p,key,sp){
  if(!soloCanBuildTower(key)){sfx(150,.1,'sawtooth');addFloat(gx(sp.c),gy(sp.r)-10,'🔒','#f44');p.radialSpot=null;return true}
  if(key==='citadel'&&towers.some(t=>t.key==='citadel'&&t.owner===0)){sfx(150,.1,'sawtooth');addFloat(gx(sp.c),gy(sp.r)-15,'MAX 1!','#f44');p.radialSpot=null;return true}
  const def=TOWERS[key];if(!def)return false;
  const cost=def.lvl[0].cost;
  if(p.gold<cost){sfx(150,.1,'sawtooth');p.radialSpot=null;return true}
  const spot=towerSpots.find(s=>s.c===sp.c&&s.r===sp.r);if(!spot||spot.tower)return false;
  p.gold-=cost;
  const t={owner:0,key,level:0,x:gx(sp.c),y:gy(sp.r),cd:0,totalCost:cost,spot,boostT:0,disabledT:0,isMega:false,cycleIdx:0};
  towers.push(t);spot.tower=t;p.radialSpot=null;
  if(TK_SPECIAL.includes(key))p.specBuilt[key]=true;
  sfx(550,.1,'sine');addFloat(t.x,t.y-15,def.icon,'#4f4');return true;
}

// ---- PAUSE OVERLAY ----
function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
  const fs=Math.min(28,W*.06);
  ctx.fillStyle='#fff';ctx.font=`bold ${fs*1.5}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('⏸ PAUSE',W/2,H*.35);
  ctx.fillStyle='#aaa';ctx.font=`${fs*.6}px sans-serif`;
  ctx.fillText('Appuie sur Échap/P ou touche ▶ pour reprendre',W/2,H*.45);
  // Resume button
  const bw=Math.min(200,W*.5),bh=50,bx=W/2-bw/2,by=H*.55;
  ctx.fillStyle='rgba(40,100,40,.9)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
  ctx.strokeStyle='#4f4';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${fs*.7}px sans-serif`;ctx.fillText('▶ Reprendre',W/2,by+bh/2);
  // Quit button
  const by2=by+bh+15;
  ctx.fillStyle='rgba(80,30,30,.9)';ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,10);ctx.fill();
  ctx.strokeStyle='#f66';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,10);ctx.stroke();
  ctx.fillStyle='#faa';ctx.fillText('🏠 Menu principal',W/2,by2+bh/2);
  soloState._pauseBtnY=by;soloState._pauseBtn2Y=by2;soloState._pauseBtnH=bh;
}

// ---- LEADERBOARD ----
function drawLeaderboard(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  const fs=Math.min(22,W*.05);
  ctx.fillStyle='#fd0';ctx.font=`bold ${fs*1.2}px sans-serif`;ctx.textAlign='center';
  ctx.fillText('🏆 Tableau d\'Honneur',W/2,H*.07);
  const lb=loadLeaderboard();
  if(lb.length===0){
    ctx.fillStyle='#666';ctx.font=`${fs*.6}px sans-serif`;
    ctx.fillText('Aucun score enregistré',W/2,H*.3);
    ctx.fillText('Termine un niveau pour apparaître ici!',W/2,H*.37);
  }else{
    const colW=W*.9,startX=W*.05,startY=H*.14;
    // Header
    ctx.fillStyle='#888';ctx.font=`bold ${fs*.5}px sans-serif`;ctx.textAlign='left';
    ctx.fillText('#',startX,startY);
    ctx.fillText('Joueur',startX+colW*.1,startY);
    ctx.fillText('Difficulté',startX+colW*.45,startY);
    ctx.fillText('Niveau',startX+colW*.7,startY);
    ctx.textAlign='right';ctx.fillText('⭐',startX+colW,startY);
    const rowH=Math.min(30,H*.045);
    lb.forEach((e,i)=>{
      const y=startY+rowH*(i+1)+4;
      const isGold=i===0,isSilver=i===1,isBronze=i===2;
      ctx.fillStyle=isGold?'rgba(255,215,0,.12)':isSilver?'rgba(192,192,192,.08)':isBronze?'rgba(205,127,50,.08)':'transparent';
      ctx.fillRect(startX,y-rowH*.6,colW,rowH);
      const medal=isGold?'🥇':isSilver?'🥈':isBronze?'🥉':`${i+1}.`;
      ctx.fillStyle=isGold?'#fd0':isSilver?'#ccc':isBronze?'#c84':'#999';
      ctx.font=`bold ${fs*.5}px sans-serif`;ctx.textAlign='left';
      ctx.fillText(medal,startX,y);
      ctx.fillStyle='#fff';ctx.fillText(e.name||'???',startX+colW*.1,y);
      const diffIcons={noob:'😊',geek:'🤓',master:'💀'};
      ctx.fillStyle='#aaa';ctx.fillText(`${diffIcons[e.diff]||''} ${e.diff}`,startX+colW*.45,y);
      ctx.fillText(`${e.level}/20`,startX+colW*.7,y);
      ctx.fillStyle='#fd0';ctx.textAlign='right';ctx.font=`bold ${fs*.55}px sans-serif`;
      ctx.fillText(e.stars,startX+colW,y);
    });
  }
  // Continue button
  const bw=Math.min(280,W*.65),bh=50,bx=W/2-bw/2,by=H*.82;
  const pulse=.7+Math.sin(gameTime*.06)*.3;
  ctx.fillStyle=`rgba(40,80,160,${pulse})`;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
  ctx.strokeStyle='#4af';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${fs*.8}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('▶ Nouvelle Partie',W/2,by+bh/2);
}

// ---- SCOUT PREVIEW ----
function getScoutPreview(){
  if(!soloState||soloState.wave>=5)return null;
  const nextW=soloState.wave+1;const lv=soloState.level;
  const lvl=SOLO_LEVELS[lv-1];if(!lvl)return null;
  const pool=lvl.monsterPool;
  const waveSizes=[1, 1.4, 1.8, 2.2, 2.8];
  const baseCount=Math.floor((10+Math.floor(lv*2))*waveSizes[nextW-1]);
  const nTypes=Math.min(pool.length, Math.max(2, 1+Math.floor(nextW*pool.length/5)));
  const UNIT_ICONS={goblin:'👺',ogre:'👹',troll:'🧌',bat:'🦇',shaman:'🧙',skeleton:'💀',drum:'🥁',necro:'☠️',golem:'🪨',rdragon:'🐉'};
  const types=pool.slice(0,nTypes);
  const perType=Math.max(2,Math.ceil(baseCount/types.length));
  let txt=types.map(k=>`${perType}×${UNIT_ICONS[k]||k}`).join(' ');
  if(nextW===3)txt+=' +🔶Mini-Boss';
  if(nextW===5)txt+=' +🔴BOSS';
  if(nextW>=2&&lv>=2&&nextW!==3&&nextW!==5)txt+=' +⭐Élite';
  return `V${nextW}: ${txt}`;
}

// ---- TOWER SOUNDS ----
function towerSfx(key){
  if(!AC)return;
  const sounds={
    archer:()=>sfx(800,.08,'triangle',.04),
    fire:()=>sfx(200,.15,'sawtooth',.05),
    ice:()=>sfx(1200,.1,'sine',.03),
    lightning:()=>{sfx(100,.05,'square',.06);sfx(2000,.03,'sawtooth',.04)},
    ballista:()=>sfx(150,.12,'square',.06),
    volcano:()=>sfx(120,.2,'sawtooth',.05),
    storm:()=>{sfx(800,.08,'sine',.03);sfx(200,.1,'sawtooth',.04)},
    explosive:()=>sfx(100,.15,'sawtooth',.07),
    citadel:()=>sfx(440,.1,'sine',.04),
  };
  (sounds[key]||sounds[key.replace('_mega','')]||(()=>{}))();
}

// ================================================================
// MAIN LOOP
// ================================================================
var _frameSkip=0;
function loop(){
  try{
    if(gameMode==='solo'){
      if(soloPaused&&soloPhase==='playing'){
        gameTime++;// keep animations ticking for HUD
      }else{
        const spd=gameSpeed;
        for(let i=0;i<spd;i++)updateSolo();
        if(soloPhase!=='playing')gameTime++;
      }
      drawSolo();
      if(soloPaused&&soloPhase==='playing')drawPauseOverlay();
    }else{
      const spd=_perfMode&&gameSpeed>1?1:gameSpeed;
      for(let i=0;i<spd;i++)update();
      if(phase!=='playing')gameTime++;
      draw();
    }
  }catch(e){console.error('Game loop error:',e)}
  requestAnimationFrame(loop);
}
loop();
